<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rep Tracker — PMF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1923; color: #e2e8f0; font-family: sans-serif; }
    #root { min-height: 100vh; }
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-size: 1.2rem; color: #64748b;
      flex-direction: column; gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #1e3a5f;
      border-top-color: #22d3ee; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading Rep Tracker...</span>
  </div>
  <div id="root"></div>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Recharts via unpkg (correct global) -->
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>

  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    // Load app.jsx, transpile with Babel, then execute
    fetch('app.jsx?v=' + Date.now())
      .then(r => {
        if (!r.ok) throw new Error('Failed to load app.jsx: ' + r.status);
        return r.text();
      })
      .then(code => {
        try {
          const transformed = Babel.transform(code, {
            presets: ['react'],
            filename: 'app.jsx'
          }).code;
          const script = document.createElement('script');
          script.textContent = transformed;
          document.body.appendChild(script);
          document.getElementById('loading').style.display = 'none';
        } catch(e) {
          document.getElementById('loading').innerHTML =
            '<span style="color:#f87171;padding:20px;text-align:center">Babel error:<br>' + e.message + '</span>';
          console.error('Babel error:', e);
        }
      })
      .catch(err => {
        document.getElementById('loading').innerHTML =
          '<span style="color:#f87171;padding:20px;text-align:center">Load error:<br>' + err.message + '</span>';
        console.error('Load error:', err);
      });
  </script>
</body>
</html>
